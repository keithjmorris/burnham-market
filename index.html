<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2C4A3E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Burnham Market" />
  <title>Burnham Market</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── STATUS BAR SPACER (iOS safe area) ── -->
  <div class="status-bar-spacer"></div>

  <!-- ── HEADER ── -->
  <header class="app-header">
    <div class="header-inner">
      <h1 class="app-title">Burnham Market</h1>
      <p class="app-subtitle" id="header-subtitle">Village Guide</p>
    </div>
  </header>

  <!-- ── MAIN CONTENT ── -->
  <main class="app-main" id="app-main">

    <!-- Loading state -->
    <div class="loading-state" id="loading-state">
      <div class="loading-spinner"></div>
      <p>Loading…</p>
    </div>

    <!-- Error state -->
    <div class="error-state hidden" id="error-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p>Couldn't load data. Please check your connection.</p>
      <button class="btn-retry" onclick="loadData()">Try again</button>
    </div>

    <!-- Cards list (Shops / Eat / Facilities / Fair) -->
    <div class="cards-list hidden" id="cards-list"></div>

    <!-- Map view (Parking / Toilets) -->
    <div class="map-view hidden" id="map-view">
      <div id="map-container"></div>
      <div class="map-legend" id="map-legend"></div>
    </div>

  </main>

  <!-- ── TAB BAR ── -->
  <nav class="tab-bar" id="tab-bar">
    <button class="tab-item active" data-tab="shops" onclick="switchTab('shops')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Shops</span>
    </button>
    <button class="tab-item" data-tab="restaurant" onclick="switchTab('restaurant')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      <span>Eat</span>
    </button>
    <button class="tab-item" data-tab="facility" onclick="switchTab('facility')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>Facilities</span>
    </button>
    <button class="tab-item" data-tab="parking" onclick="switchTab('parking')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 17V7h4a3 3 0 0 1 0 6H9"/></svg>
      <span>Parking</span>
    </button>
    <button class="tab-item" data-tab="toilets" onclick="switchTab('toilets')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V12"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/><circle cx="12" cy="5" r="3"/></svg>
      <span>Toilets</span>
    </button>
    <!-- Fair tab — shown conditionally by JS -->
    <button class="tab-item hidden" data-tab="fair" id="fair-tab" onclick="switchTab('fair')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span>Fair</span>
    </button>
  </nav>

  <!-- ── OPENING HOURS BOTTOM SHEET ── -->
  <div class="sheet-backdrop hidden" id="sheet-backdrop" onclick="closeSheet()"></div>
  <div class="bottom-sheet hidden" id="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <h2 class="sheet-title" id="sheet-title"></h2>
      <p class="sheet-subtitle" id="sheet-subtitle"></p>
      <div class="hours-grid" id="hours-grid"></div>
      <div class="sheet-special" id="sheet-special"></div>
    </div>
    <button class="sheet-close" onclick="closeSheet()">Close</button>
  </div>

  <!-- Leaflet for maps -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
